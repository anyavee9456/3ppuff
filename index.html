<style>
  :root{
    --bg:#FBF6E9;
    --surface:#FFFFFF;
    --surface-alt:#FFF3D6;
    --ink:#3A2E1F;
    --ink-soft:#7A6B54;
    --accent:#C08A2E;
    --accent-dark:#96691E;
    --accent-bg:#F5E7C8;
    --success:#4C6B44;
    --success-bg:#E4EEDD;
    --danger:#B5482D;
    --danger-bg:#F6E1D8;
    --border:#E9DFC7;
    --radius:14px;
    --shadow:0 2px 10px rgba(58,46,31,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Leelawadee UI","Segoe UI","Thonburi",Tahoma,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .pleat{
    height:14px;
    background-image:radial-gradient(circle at 8px 0px, transparent 8px, var(--accent) 8.5px);
    background-size:16px 16px;
    background-repeat:repeat-x;
    background-position:top;
    flex-shrink:0;
  }
  .topbar{
    background:var(--accent-dark);
    color:#fff;
    padding:14px 16px 18px;
    flex-shrink:0;
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-size:17px;font-weight:700;margin:0;}
  .topbar-sub{font-size:12.5px;opacity:0.85;margin-top:2px;}
  .icon-btn{
    background:rgba(255,255,255,0.15);
    border:none;
    color:#fff;
    width:34px;height:34px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .content{
    flex:1;
    padding:16px 16px 90px;
    overflow-y:auto;
  }
  .content.no-nav{padding-bottom:24px;}
  h1,h2,h3{margin:0 0 12px;}
  h2{font-size:17px;}
  h3{font-size:14.5px;color:var(--ink-soft);font-weight:700;}
  p{margin:0;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:12px;
    box-shadow:var(--shadow);
  }
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .col{display:flex;flex-direction:column;gap:4px;}
  .muted{color:var(--ink-soft);font-size:13px;}
  .big-number{font-size:34px;font-weight:800;color:var(--accent-dark);line-height:1;}
  .label-sm{font-size:12px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 16px;
    border-radius:11px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--ink);
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-block{width:100%;}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--accent-dark);padding:8px 10px;}
  .btn-danger{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
  .btn-success{background:var(--success-bg);border-color:var(--success);color:var(--success);}
  .btn-sm{padding:7px 11px;font-size:13px;border-radius:9px;}
  input,select,textarea{
    width:100%;
    font-size:15px;
    padding:11px 12px;

function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function pad2(n){ return String(n).padStart(2,'0'); }
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function addDays(iso,n){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
}
const THAI_DAYS=['อา','จ','อ','พ','พฤ','ศ','ส'];
const THAI_MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function thaiDate(iso){ const d=new Date(iso+'T00:00:00'); return `${THAI_DAYS[d.getDay()]} ${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`; }
function money(n){ return Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:2}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- PromptPay QR payload (EMVCo standard) ---------- */
function crc16(str){
  let crc=0xFFFF;
  for(let c=0;c<str.length;c++){
    crc ^= str.charCodeAt(c) << 8;
    for(let i=0;i<8;i++){
      crc = (crc & 0x8000) ? ((crc<<1)^0x1021) : (crc<<1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function tlv(id,val){ return id + String(val.length).padStart(2,'0') + val; }
function promptPayPayload(target,amount){
  let t = String(target).replace(/[^0-9]/g,'');
  let type;
  if(t.length===13){ type='02'; }
  else { type='01'; t = t.replace(/^0/,'66'); t = t.padStart(13,'0'); }
  const merchant = tlv('00','A000000677010111') + tlv(type,t);
  let payload = tlv('00','01') + tlv('01', amount?'12':'11') + tlv('29',merchant) + tlv('53','764');
  if(amount) payload += tlv('54', Number(amount).toFixed(2));
  payload += tlv('58','TH') + '6304';
  return payload + crc16(payload);
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = src;
    s.onload = ()=>resolve(true);
    s.onerror = ()=>reject(new Error('โหลดสคริปต์ไม่สำเร็จ: '+src));
    document.head.appendChild(s);
  });
}
async function ensureSupabaseLib(){
  if(window.supabase && window.supabase.createClient) return;
  const sources = [
    'https://cdnjs.cloudflare.com/ajax/libs/supabase/2.38.0/supabase.min.js',
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  ];
  let lastErr = null;
  for(const src of sources){
    try{
      await loadScript(src);
      if(window.supabase && window.supabase.createClient) return;
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('ไม่พบไลบรารี Supabase จากแหล่งใดเลย');
}

function rowToCustomer(r){ return {id:r.id, name:r.name, phone:r.phone, address:r.address, type:r.type, branchId:r.branch_id}; }
function rowToOrder(r, itemRows){

  const firstErr = [brR,empR,prodR,custR,ordR,itemR,rordR,ritemR,setR,ingR,recR,expR].find(r=>r.error);

}

async function bootstrapSeedToSupabase(){
  const s = seed();
  if(s.branches.length) await sb.from('branches').insert(s.branches);
  if(s.employees.length) await sb.from('employees').insert(s.employees.map(e=>({id:e.id, branch_id:e.branchId, name:e.name, pin:e.pin})));
  if(s.products.length) await sb.from('products').insert(s.products);
  if(s.ingredients && s.ingredients.length) await sb.from('ingredients').insert(s.ingredients.map(i=>({id:i.id, name:i.name, unit:i.unit, cost_per_unit:i.costPerUnit})));
  if(s.customers.length) await sb.from('customers').insert(s.customers.map(c=>({id:c.id, name:c.name, phone:c.phone, address:c.address, type:c.type, branch_id:c.branchId})));
  await sb.from('settings').upsert({id:1, promptpay_id:s.settings.promptpayId, multi_branch:s.settings.multiBranch});
  for(const o of s.orders){
    await sb.from('orders').insert({id:o.id, branch_id:o.branchId, customer_id:o.customerId, employee_id:o.employeeId, delivery_date:o.deliveryDate, job_status:o.jobStatus, payment_status:o.paymentStatus, payment_method:o.paymentMethod, created_at:o.createdAt});
    await sb.from('order_items').insert(o.items.map(i=>({order_id:o.id, product_id:i.productId, qty:i.qty, price:i.price})));
  }
  for(const r of s.recurringOrders){
    await sb.from('recurring_orders').insert({id:r.id, customer_id:r.customerId, day_of_week:r.dayOfWeek, is_active:r.isActive});
    await sb.from('recurring_order_items').insert(r.items.map(i=>({recurring_order_id:r.id, product_id:i.productId, default_qty:i.defaultQty})));
  }
}

/* ---------- render root ---------- */
function render(){
  const app=document.getElementById('app');
  const active = document.activeElement;
  let focusInfo = null;
  if(active && active.dataset && active.dataset.fid){
    focusInfo = { fid: active.dataset.fid, start: active.selectionStart, end: active.selectionEnd };
  }
  if(bootError){
    app.innerHTML = `<div style="padding:40px 20px;text-align:center;">
      <div style="font-size:36px;">⚠️</div>
      <h2 style="margin:14px 0 6px;">เชื่อมฐานข้อมูลไม่สำเร็จ</h2>
      <p class="muted" style="margin-bottom:6px;">${esc(bootError)}</p>
      <p class="muted" style="margin-bottom:18px;">เช็คว่ารันไฟล์ SQL สร้างตารางใน Supabase แล้วหรือยัง</p>
      <button class="btn btn-primary" onclick="bootError=null;boot();">ลองใหม่</button>
      <button class="btn" style="margin-top:10px;" onclick="bootError=null;db=seed();render();">ใช้โหมดออฟไลน์ไปก่อน</button>
    </div>`;
    return;
  }
  if(!state.session){ app.innerHTML = renderLogin(); return; }
  const showNav = !['neworder'].includes(state.view);
  app.innerHTML = renderTopbar() + `<div class="content ${showNav?'':'no-nav'}">` + renderView() + '</div>' + (showNav?renderNav():'') + (state.toastMsg?`<div class="toast">${esc(state.toastMsg)}</div>`:'');
  afterRender();
  if(focusInfo){
    const el = app.querySelector(`[data-fid="${focusInfo.fid}"]`);
    if(el){
      el.focus();
      if(typeof focusInfo.start==='number' && el.setSelectionRange){
        try{ el.setSelectionRange(focusInfo.start, focusInfo.end); }catch(e){}
      }
    }
  }
}

function renderTopbar(){
  const emp = db.employees.find(e=>e.id===state.session.employeeId);
  const br = db.branches.find(b=>b.id===state.session.branchId);
  const isSub = ['customers','customerDetail','employees','employeeDetail','products','productDetail','ingredients','ingredientDetail','recurring','settings','expenses','expenseDetail'].includes(state.view);
  return `<div class="topbar">
    ${isSub?`<button class="icon-btn" onclick="goTo('${({customerDetail:'customers',employeeDetail:'employees',productDetail:'products',ingredientDetail:'ingredients',expenseDetail:'expenses'})[state.view]||'more'}')" style="margin-bottom:8px;">${ICO.back}</button>`:''}
    <div class="topbar-row" style="align-items:center;">
      <div style="width:34px;flex-shrink:0;"></div>
      <div style="flex:1;text-align:center;">
        <p class="topbar-title" style="margin:0;">3P Puff</p>
        <p class="topbar-sub" style="margin:2px 0 0;">${db.settings.multiBranch?esc(br?br.name:'')+' · ':''}${esc(emp?emp.name:'')}</p>
      </div>
      <button class="icon-btn" onclick="logout()" title="ออกจากระบบ" style="flex-shrink:0;">${ICO.logout}</button>
    </div>
  </div><div class="pleat"></div>`;
}

function renderNav(){
  const items=[
    {v:'home',ico:ICO.home,label:'วันนี้'},
    {v:'history',ico:ICO.list,label:'ประวัติ'},
    {v:'__new',ico:ICO.plus,label:''},
    {v:'reports',ico:ICO.chart,label:'รายงาน'},
    {v:'more',ico:ICO.menu,label:'อื่นๆ'},
  ];
  return `<div class="navbar">` + items.map(it=>{
    if(it.v==='__new') return `<button class="nav-item" onclick="openNewOrder()"><span class="fab">${ICO.plus}</span></button>`;
    const active = state.view===it.v || (it.v==='more' && ['customers','customerDetail','employees','employeeDetail','products','productDetail','ingredients','ingredientDetail','recurring','settings','expenses','expenseDetail'].includes(state.view));
    return `<button class="nav-item ${active?'active':''}" onclick="goTo('${it.v}')">${it.ico}<span>${it.label}</span></button>`;
  }).join('') + `</div>`;
}

function renderView(){
  switch(state.view){
    case 'home': return renderHome();
    case 'neworder': return renderOrderForm();
    case 'history': return renderHistory();
    case 'reports': return renderReports();
    case 'more': return renderMore();
    case 'customers': return renderCustomers();
    case 'customerDetail': return renderCustomerDetail();
    case 'employees': return renderEmployees();
    case 'employeeDetail': return renderEmployeeDetail();
    case 'products': return renderProducts();
    case 'productDetail': return renderProductDetail();
    case 'ingredients': return renderIngredients();
    case 'ingredientDetail': return renderIngredientDetail();
    case 'expenses': return renderExpenses();
    case 'expenseDetail': return renderExpenseDetail();
    case 'recurring': return renderRecurring();
    case 'settings': return renderSettings();
    default: return '';
  }
}

      </div>

function renderFirstEmployeeSetup(){
  return `<div class="content" style="padding-top:50px;">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:40px;">🥟</div>
      <h1 style="font-size:20px;margin-top:8px;">ยินดีต้อนรับสู่ 3P กะหรี่ปั๊ป</h1>
      <p class="muted">ตั้งค่าเริ่มต้น: เพิ่มพนักงานคนแรกของคุณ</p>
    </div>
    <div class="card">
      <div class="field"><label>ชื่อร้าน / สาขา</label><input id="fs_branch" value="${esc(db.branches[0]?db.branches[0].name:'ร้าน 3P กะหรี่ปั๊ป')}"></div>

    </div>
  </div>`;
}
function completeFirstSetup(){
  const branchName = document.getElementById('fs_branch').value.trim() || 'ร้าน 3P กะหรี่ปั๊ป';
  const name = document.getElementById('fs_name').value.trim();
  const pin = document.getElementById('fs_pin').value.trim();
  if(!name){ toast('กรุณากรอกชื่อพนักงาน'); return; }
  if(!/^\d{4}$/.test(pin)){ toast('รหัส PIN ต้องเป็นตัวเลข 4 หลัก'); return; }
  if(db.branches[0]) db.branches[0].name = branchName;
  const emp = {id:uid('e'), branchId:db.branches[0].id, name, pin};
  db.employees.push(emp);
  persist(async ()=>{
    const { error:e1 } = await sb.from('branches').upsert({id:db.branches[0].id, name:branchName});
    if(e1) throw e1;
    const { error:e2 } = await sb.from('employees').insert({id:emp.id, branch_id:emp.branchId, name:emp.name, pin:emp.pin});
    if(e2) throw e2;
  });
  state.session = {branchId:emp.branchId, employeeId:emp.id};
  state.view='home';
  render();
  toast('ตั้งค่าเริ่มต้นเสร็จแล้ว! เพิ่มพนักงานคนอื่นได้ที่เมนู "จัดการพนักงาน"');
}
function selectBranch(id){ state.loginBranch=id; render(); }
function selectEmployee(id){ state.loginEmployee=id; state.pinInput=''; render(); }
function pinPress(d){
  if(state.pinInput.length>=4) return;
  state.pinInput += d;
  render();
  if(state.pinInput.length===4){
    const emp = db.employees.find(e=>e.id===state.loginEmployee);
    setTimeout(()=>{
      if(emp.pin===state.pinInput){
        state.session={branchId:state.loginBranch,employeeId:state.loginEmployee};
        state.view='home';
        render();
      } else {
        state.pinInput='';
        toast('รหัส PIN ไม่ถูกต้อง');
      }
    },150);
  }
}
function pinBackspace(){ state.pinInput = state.pinInput.slice(0,-1); render(); }
function logout(){ state.session=null; state.loginBranch=null; state.loginEmployee=null; state.pinInput=''; state.view='login'; render(); }
function goTo(v){ state.view=v; render(); window.scrollTo(0,0); }

/* ---------- HOME ---------- */
function visibleOrders(dateFilterFn){
  return db.orders.filter(o=>{
    if(o.jobStatus==='cancelled') return false;
    if(state.branchScope==='mine' && o.branchId!==state.session.branchId) return false;
    return dateFilterFn(o);
  });
}
function renderHome(){
  let orders = visibleOrders(o=>o.deliveryDate===state.selectedDate).sort((a,b)=>a.createdAt-b.createdAt);
  orders = applyOrderSort(orders);
  const totalQty = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>x+i.qty,0),0);
  const totalRevenue = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>x+i.qty*i.price,0),0);
  const byProduct = {};
  orders.forEach(o=>o.items.forEach(i=>{ byProduct[i.productId]=(byProduct[i.productId]||0)+i.qty; }));
  const sortedProd = Object.entries(byProduct).sort((a,b)=>b[1]-a[1]);

  return `
  <div class="pill-row">
    <div class="pill ${state.selectedDate===todayISO()?'active':''}" onclick="setDate('${todayISO()}')">วันนี้</div>
    <div class="pill ${state.selectedDate===addDays(todayISO(),1)?'active':''}" onclick="setDate('${addDays(todayISO(),1)}')">พรุ่งนี้</div>
    <div class="pill ${state.selectedDate===addDays(todayISO(),-1)?'active':''}" onclick="setDate('${addDays(todayISO(),-1)}')">เมื่อวาน</div>
    <div class="pill" style="display:flex;align-items:center;">
      <input type="date" value="${state.selectedDate}" oninput="setDate(this.value)" style="border:none;padding:0;width:120px;font-size:13px;font-weight:700;color:var(--ink-soft);background:transparent;">
    </div>
  </div>
  <p class="muted" style="margin-bottom:10px;">${thaiDate(state.selectedDate)}</p>

  ${db.settings.multiBranch?`
  <div class="row" style="margin-bottom:10px;">
    <h3 style="margin:0;">${state.branchScope==='mine'?'สาขาของฉัน':'ทุกสาขา'}</h3>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm ${state.branchScope==='mine'?'btn-primary':''}" onclick="state.branchScope='mine';render();">สาขาฉัน</button>
      <button class="btn btn-sm ${state.branchScope==='all'?'btn-primary':''}" onclick="state.branchScope='all';render();">ทุกสาขา</button>
    </div>
  </div>
  `:''}

  <div class="card">
    <p class="label-sm">ยอดรวมวันนี้</p>
    <p style="margin:2px 0 0;"><span class="big-number" style="font-size:26px;">${totalQty.toLocaleString()} ชิ้น</span><span style="font-size:18px;color:var(--ink-soft);font-weight:700;"> = ${money(totalRevenue)} บาท</span></p>
    ${sortedProd.length? `<div class="divider"></div><p style="font-size:14px;line-height:1.9;">` + sortedProd.map(([pid,qty])=>{
      const p = db.products.find(x=>x.id===pid);
      return `<b>${esc(p?p.name:'?')}</b> ${qty.toLocaleString()} ชิ้น`;
    }).join(' <span class="muted">|</span> ') + `</p>` : `<p class="muted" style="margin-top:8px;">ยังไม่มีออเดอร์วันนี้</p>`}
  </div>

  ${orders.length>0? `
  <h3>สรุปตามพนักงาน</h3>
  <div class="card">
    ${(() => {
      const activeProducts = sortedActiveProducts();
      const byEmp = {};
      orders.forEach(o=>{
        if(!byEmp[o.employeeId]) byEmp[o.employeeId] = { qtyByProduct:{}, revenue:0 };
        o.items.forEach(i=>{
          byEmp[o.employeeId].qtyByProduct[i.productId] = (byEmp[o.employeeId].qtyByProduct[i.productId]||0) + i.qty;
          byEmp[o.employeeId].revenue += i.qty*i.price;
        });
      });
      const rows = Object.entries(byEmp).sort((a,b)=>b[1].revenue-a[1].revenue);
      return rows.map(([eid,d],idx)=>{
        const emp = db.employees.find(e=>e.id===eid);
        const parts = activeProducts.map(p=>`${esc(p.name)} ${(d.qtyByProduct[p.id]||0).toLocaleString()} ชิ้น`).join(' <span class="muted">|</span> ');
        return `<div style="padding:8px 0;${idx<rows.length-1?'border-bottom:1px solid var(--border);':''}">
          <div class="row"><b>${esc(emp?emp.name:'-')}</b><b style="color:var(--accent-dark);">${money(d.revenue)} บาท</b></div>
          <p class="muted" style="font-size:13px;margin-top:3px;">${parts}</p>
        </div>`;
      }).join('');
    })()}
  </div>
  `:''}

  <h3>รายการออเดอร์ (${orders.length})</h3>
  ${orders.length===0? `<div class="empty">ยังไม่มีออเดอร์สำหรับวันนี้<br><br><button class="btn btn-primary" onclick="openNewOrder()">+ สร้างออเดอร์ใหม่</button></div>` :
    renderOrdersBlock(orders)}
  `;
}
function setDate(d){ state.selectedDate=d; render(); }

function statusBadge(job){
  const map={pending:['badge-pending','รอทำ'],in_progress:['badge-progress','กำลังทำ'],delivered:['badge-done','ส่งแล้ว'],cancelled:['badge-cancel','ยกเลิก']};
  const [cls,label]=map[job]||map.pending;
  return `<span class="badge ${cls}">${label}</span>`;
}
function payBadge(pay){
  return pay==='paid' ? `<span class="badge badge-paid">จ่ายแล้ว</span>` : `<span class="badge badge-unpaid">ค้างจ่าย</span>`;
}
function sortArrow(field){
  if(!state.orderSort || state.orderSort.by!==field) return '';
  return state.orderSort.dir==='asc' ? ' ▲' : ' ▼';
}
function toggleSort(field){
  if(!state.orderSort) state.orderSort = {by:null, dir:'asc'};
  if(state.orderSort.by===field){ state.orderSort.dir = state.orderSort.dir==='asc'?'desc':'asc'; }
  else { state.orderSort.by=field; state.orderSort.dir='asc'; }
  render();
}
function applyOrderSort(orders){
  if(!state.orderSort || !state.orderSort.by) return orders;
  const {by,dir} = state.orderSort;
  const mul = dir==='asc' ? 1 : -1;
  return [...orders].sort((a,b)=>{
    const av = by==='employee' ? (db.employees.find(e=>e.id===a.employeeId)||{}).name||'' : (db.customers.find(c=>c.id===a.customerId)||{}).name||'';
    const bv = by==='employee' ? (db.employees.find(e=>e.id===b.employeeId)||{}).name||'' : (db.customers.find(c=>c.id===b.customerId)||{}).name||'';
    return av.localeCompare(bv,'th') * mul;
  });
}
function bulkSetStatus(ids,val){
  ids.forEach(id=>{ const o=db.orders.find(x=>x.id===id); if(o) o.jobStatus=val; });
  persist(async ()=>{
    for(const id of ids){ const { error } = await sb.from('orders').update({job_status:val}).eq('id',id); if(error) throw error; }
  });
  render();
  toast(`อัปเดตสถานะ ${ids.length} ออเดอร์แล้ว`);
}
function togglePayment(id){
  const o = db.orders.find(x=>x.id===id);
  const val = o.paymentStatus==='paid' ? 'unpaid' : 'paid';
  o.paymentStatus = val;
  if(val==='paid' && !o.paymentMethod) o.paymentMethod='cash';
  persist(async ()=>{ const { error } = await sb.from('orders').update({payment_status:val, payment_method:o.paymentMethod}).eq('id',id); if(error) throw error; });
  render();
}
function renderOrdersBlock(orders){
  if(orders.length===0) return '';
  const idsJson = JSON.stringify(orders.map(o=>o.id));
  return `
  <div class="card" style="padding:12px 14px;margin-bottom:10px;">
    <p class="label-sm" style="margin-bottom:8px;">เปลี่ยนสถานะงานทั้งหมดที่แสดงอยู่</p>
    <div class="row" style="gap:8px;">
      <select id="bulkStatusSelect" style="flex:1;">
        <option value="pending">รอทำ</option>
        <option value="in_progress">กำลังทำ</option>
        <option value="delivered">ส่งแล้ว</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick='bulkSetStatus(${idsJson}, document.getElementById("bulkStatusSelect").value)'>ใช้กับทั้งหมด (${orders.length})</button>
    </div>
  </div>
  ` + renderOrdersTable(orders);
}
function renderOrdersTable(orders){
  if(orders.length===0) return '';
  const activeProducts = sortedActiveProducts();
  return `<div class="order-table-wrap"><table class="order-table">
    <thead><tr>
      <th onclick="toggleSort('customer')" style="cursor:pointer;">ลูกค้า${sortArrow('customer')}</th>
      <th onclick="toggleSort('employee')" style="cursor:pointer;">พนักงาน${sortArrow('employee')}</th>
      ${activeProducts.map(p=>`<th>${esc(p.name)}</th>`).join('')}
      <th>ยอดรวม (บาท)</th>
      <th>ที่อยู่</th>
      <th>สถานะจ่าย</th>
      <th>สถานะงาน</th>
    </tr></thead>
    <tbody>
      ${orders.map(o=>{
        const cust = db.customers.find(c=>c.id===o.customerId);
        const emp = db.employees.find(e=>e.id===o.employeeId);
        const total = o.items.reduce((s,i)=>s+i.qty*i.price,0);
        return `<tr style="cursor:pointer;" onclick="openEditOrder('${o.id}')">
          <td><b>${esc(cust?cust.name:'ลูกค้า')}</b></td>
          <td>${esc(emp?emp.name:'-')}</td>
          ${activeProducts.map(p=>{
            const item = o.items.find(i=>i.productId===p.id);
            const qty = item?item.qty:0;
            return `<td class="qty-cell ${qty?'':'zero'}">${qty||'–'}</td>`;
          }).join('')}
          <td style="font-weight:700;color:var(--accent-dark);">${money(total)}</td>
          <td class="addr-cell">${esc(cust?cust.address:'-')||'-'}</td>
          <td onclick="event.stopPropagation();">
            <span class="badge ${o.paymentStatus==='paid'?'badge-paid':'badge-unpaid'}" style="cursor:pointer;" onclick="togglePayment('${o.id}')">${o.paymentStatus==='paid'?'จ่ายแล้ว':'ค้างจ่าย'}</span>
          </td>
          <td onclick="event.stopPropagation();">
            <select onchange="quickStatus('${o.id}',this.value)" style="width:auto;padding:6px 8px;font-size:12px;">
              <option value="pending" ${o.jobStatus==='pending'?'selected':''}>รอทำ</option>
              <option value="in_progress" ${o.jobStatus==='in_progress'?'selected':''}>กำลังทำ</option>
              <option value="delivered" ${o.jobStatus==='delivered'?'selected':''}>ส่งแล้ว</option>
            </select>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}
function quickStatus(id,val){
  const o=db.orders.find(x=>x.id===id); o.jobStatus=val;
  persist(async ()=>{ const { error } = await sb.from('orders').update({job_status:val}).eq('id',id); if(error) throw error; });
  render(); toast('อัปเดตสถานะแล้ว');
}
function quickPay(id){
  const o=db.orders.find(x=>x.id===id);
  if(o.paymentStatus!=='paid'){
    o.paymentStatus='paid'; o.paymentMethod=o.paymentMethod||'cash';
    persist(async ()=>{ const { error } = await sb.from('orders').update({payment_status:'paid', payment_method:o.paymentMethod}).eq('id',id); if(error) throw error; });
    toast('บันทึกว่าจ่ายแล้ว'); render();
  }
}

  state.orderForm = {

    items: activeProducts.map(p=>({productId:p.id, qty:0, price:p.price})),
  };
  state.customerSearch=''; state.showNewCustomer=false; state.newCustomerDraft=null;

function openEditOrder(id){
  const o = db.orders.find(x=>x.id===id);

function f_customerId_cleared(){ state.orderForm.customerId=null; return true; }
function pickCustomer(id){
  const c = db.customers.find(x=>x.id===id);
  state.orderForm.customerId = id;
  state.customerSearch = c.name;
  render();
}
function confirmNewCustomer(){
  const d = state.newCustomerDraft;
  if(!d.name.trim()){ toast('กรุณากรอกชื่อลูกค้า'); return; }
  const c = {id:uid('c'), name:d.name.trim(), phone:d.phone.trim(), address:d.address.trim(), type:d.type, branchId:state.session.branchId};
  db.customers.push(c);
  state.orderForm.customerId = c.id;
  state.customerSearch = c.name;
  state.showNewCustomer = false;
  persist(async ()=>{
    const { error } = await sb.from('customers').insert({id:c.id, name:c.name, phone:c.phone, address:c.address, type:c.type, branch_id:c.branchId});
    if(error) throw error;
  });
  render();
  toast('เพิ่มลูกค้าใหม่แล้ว');
}
function setItemPrice(pid,val){
  const it = state.orderForm.items.find(i=>i.productId===pid);
  it.price = Math.max(0, parseFloat(val)||0);
  render();
}
function setItemQty(pid,val){
  const it = state.orderForm.items.find(i=>i.productId===pid);
  it.qty = Math.max(0, parseInt(val)||0);
  render();
}
function stepQty(pid,delta){
  const it = state.orderForm.items.find(i=>i.productId===pid);
  it.qty = Math.max(0, it.qty+delta);
  render();
}
function cancelOrderForm(){ state.orderForm=null; goTo('home'); }
function saveOrder(){
  const f = state.orderForm;
  if(!f.customerId){ toast('กรุณาเลือกหรือเพิ่มลูกค้า'); return; }
  const chosen = f.items.filter(i=>i.qty>0).map(i=>({productId:i.productId, qty:i.qty, price:Number(i.price)||0}));
  if(chosen.length===0){ toast('กรุณาใส่จำนวนอย่างน้อย 1 ไส้'); return; }
  f.items = chosen;
  if(f.id){
    const idx = db.orders.findIndex(o=>o.id===f.id);
    db.orders[idx] = f;
    toast('บันทึกการแก้ไขแล้ว');
  } else {
    f.id = uid('o');
    f.createdAt = Date.now();
    db.orders.push(f);
    toast('สร้างออเดอร์แล้ว');
  }
  persist(async ()=>{
    const { error:e1 } = await sb.from('orders').upsert({
      id:f.id, branch_id:f.branchId, customer_id:f.customerId, employee_id:f.employeeId,
      delivery_date:f.deliveryDate, job_status:f.jobStatus, payment_status:f.paymentStatus,
      payment_method:f.paymentMethod, created_at:f.createdAt,
    });
    if(e1) throw e1;
    await sb.from('order_items').delete().eq('order_id', f.id);
    const { error:e2 } = await sb.from('order_items').insert(f.items.map(i=>({order_id:f.id, product_id:i.productId, qty:i.qty, price:i.price})));
    if(e2) throw e2;
  });
  state.orderForm=null;
  goTo('home');
}
function cancelOrder(id){
  if(!confirm('ยืนยันยกเลิกออเดอร์นี้?')) return;
  const o = db.orders.find(x=>x.id===id);
  o.jobStatus='cancelled';
  persist(async ()=>{ const { error } = await sb.from('orders').update({job_status:'cancelled'}).eq('id',id); if(error) throw error; });
  state.orderForm=null;
  goTo('history');
  toast('ยกเลิกออเดอร์แล้ว');
}
function showQR(orderId,total){ state.qrOrderId=orderId||'draft'; state._qrTotal=total; render(); }
function closeQR(){ state.qrOrderId=null; render(); }

/* ---------- HISTORY ---------- */
function renderHistory(){
  const hf = state.historyFilter;
  let orders = db.orders.filter(o=>{
    if(state.branchScope==='mine' && o.branchId!==state.session.branchId) return false;
    if(o.deliveryDate<hf.from || o.deliveryDate>hf.to) return false;
    if(hf.q){
      const cust = db.customers.find(c=>c.id===o.customerId);
      const q = hf.q.toLowerCase();
      if(!(cust && (cust.name.toLowerCase().includes(q)||cust.phone.includes(q)))) return false;
    }
    return true;
  }).sort((a,b)=>b.deliveryDate.localeCompare(a.deliveryDate) || b.createdAt-a.createdAt);
  orders = applyOrderSort(orders);

  return `
  <div class="card">
    <div class="field" style="margin-bottom:10px;"><label>ค้นหาลูกค้า</label><input data-fid="hist-q" value="${esc(hf.q)}" oninput="hf.q=this.value; render();" placeholder="ชื่อหรือเบอร์โทร"></div>
    <div style="display:flex;gap:8px;">
      <div class="field" style="flex:1;margin-bottom:0;"><label>ตั้งแต่</label><input type="date" value="${hf.from}" oninput="hf.from=this.value;render();"></div>
      <div class="field" style="flex:1;margin-bottom:0;"><label>ถึง</label><input type="date" value="${hf.to}" oninput="hf.to=this.value;render();"></div>
    </div>
  </div>
  <p class="muted" style="margin-bottom:8px;">พบ ${orders.length} ออเดอร์</p>
  ${orders.length===0?`<div class="empty">ไม่พบออเดอร์ในช่วงที่เลือก</div>`:renderOrdersBlock(orders)}
  `;
}

function renderProducts(){

  <div style="height:12px;"></div>
  ${list.length===0?`<div class="empty">ยังไม่มีไส้ในระบบ</div>`:list.map((p,idx)=>`
    <div class="card">
      <div class="row" style="cursor:pointer;" onclick="openProductDetail('${p.id}')">
        <div class="col"><b>${esc(p.name)}</b><span class="muted">ราคาขาย ${money(p.price)}฿ · ต้นทุน ${money(p.cost)}฿${p.recipe&&p.recipe.length?` · ${p.recipe.length} วัตถุดิบ`:''}</span></div>
        <span class="badge ${p.active===false?'badge-cancel':'badge-done'}">${p.active===false?'ปิดขายอยู่':'เปิดขายอยู่'}</span>
      </div>
      <div class="row" style="margin-top:8px;" onclick="event.stopPropagation();">
        <span class="muted" style="font-size:12px;">ลำดับการแสดงผล</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" ${idx===0?'disabled':''} onclick="moveProduct('${p.id}',-1)">▲ ขึ้น</button>
          <button class="btn btn-sm" ${idx===list.length-1?'disabled':''} onclick="moveProduct('${p.id}',1)">▼ ลง</button>
        </div>
      </div>
    </div>
  `).join('')}
  `;
}
function moveProduct(id,dir){
  const list = sortedAllProducts();
  const idx = list.findIndex(p=>p.id===id);
  const swapIdx = idx+dir;
  if(swapIdx<0 || swapIdx>=list.length) return;
  [list[idx], list[swapIdx]] = [list[swapIdx], list[idx]];
  list.forEach((p,i)=>{ p.sortOrder=i; });
  persist(async ()=>{
    for(const p of list){
      const { error } = await sb.from('products').update({sort_order:p.sortOrder}).eq('id',p.id);
      if(error) throw error;
    }
  });
  render();
}
function openProductDetail(id){
  if(id){
    const p = db.products.find(x=>x.id===id);
    state.productForm = JSON.parse(JSON.stringify(p));
    if(!state.productForm.recipe) state.productForm.recipe=[];
  } else {
    state.productForm = {id:null, name:'', price:15, cost:0, active:true, recipe:[], sortOrder: db.products.length};

  goTo('productDetail');
}

  return (p.recipe||[]).reduce((s,r)=>{ const ing=db.ingredients.find(i=>i.id===r.ingredientId); return s + (ing?ing.costPerUnit*r.amount:0); },0);

/* ---------- EXPENSES / ต้นทุน ---------- */
function renderExpenses(){
  let from,to;
  const r = state.expenseRange;
  if(r==='thismonth'){
    const d=new Date(); const y=d.getFullYear(), m=d.getMonth();
    from = `${y}-${pad2(m+1)}-01`;
    const lastDay = new Date(y, m+1, 0).getDate();
    to = `${y}-${pad2(m+1)}-${pad2(lastDay)}`;
  } else if(r==='custom'){
    from = state.expenseCustomFrom; to = state.expenseCustomTo;
  } else {
    from = addDays(todayISO(), -parseInt(r)); to = todayISO();
  }

  const expenses = db.expenses.filter(e=>{
    if(state.branchScope==='mine' && e.branchId!==state.session.branchId) return false;
    return e.date>=from && e.date<=to;
  }).sort((a,b)=>b.date.localeCompare(a.date) || b.createdAt-a.createdAt);

  const orders = db.orders.filter(o=>{
    if(o.jobStatus==='cancelled') return false;
    if(state.branchScope==='mine' && o.branchId!==state.session.branchId) return false;
    return o.deliveryDate>=from && o.deliveryDate<=to;
  });
  const totalSales = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>x+i.qty*i.price,0),0);
  const totalExpense = expenses.reduce((s,e)=>s+e.amount,0);
  const profit = totalSales - totalExpense;

  return `
  <div class="pill-row">
    <div class="pill ${r==='7'?'active':''}" onclick="state.expenseRange='7';render();">7 วันล่าสุด</div>
    <div class="pill ${r==='30'?'active':''}" onclick="state.expenseRange='30';render();">30 วันล่าสุด</div>
    <div class="pill ${r==='thismonth'?'active':''}" onclick="state.expenseRange='thismonth';render();">เดือนนี้</div>
    <div class="pill ${r==='custom'?'active':''}" onclick="state.expenseRange='custom';render();">กำหนดเอง</div>
  </div>
  ${r==='custom'?`
  <div class="card" style="margin-top:-4px;">
    <div style="display:flex;gap:8px;">
      <div class="field" style="flex:1;margin-bottom:0;"><label>ตั้งแต่</label><input type="date" value="${state.expenseCustomFrom}" oninput="state.expenseCustomFrom=this.value;render();"></div>
      <div class="field" style="flex:1;margin-bottom:0;"><label>ถึง</label><input type="date" value="${state.expenseCustomTo}" oninput="state.expenseCustomTo=this.value;render();"></div>
    </div>
  </div>
  `:''}

  <div class="card">
    <div class="row"><span>ยอดขายรวม</span><b>${money(totalSales)} บาท</b></div>
    <div class="row"><span>รายจ่ายรวม (จากที่บันทึกจริง)</span><b>${money(totalExpense)} บาท</b></div>
    <div class="divider"></div>
    <div class="row"><span style="font-weight:700;">กำไรจริง</span><b style="color:${profit>=0?'var(--success)':'var(--danger)'};">${money(profit)} บาท</b></div>
  </div>

  <button class="btn btn-primary btn-block" onclick="openExpenseDetail(null)">+ บันทึกรายจ่าย</button>
  <div style="height:12px;"></div>
  <h3>รายการรายจ่าย (${expenses.length})</h3>
  ${expenses.length===0?`<div class="empty">ยังไม่มีรายการรายจ่ายในช่วงนี้</div>`:expenses.map(e=>`
    <div class="card" style="cursor:pointer;" onclick="openExpenseDetail('${e.id}')">
      <div class="row">
        <div class="col"><b>${esc(e.description||'(ไม่มีรายละเอียด)')}</b><span class="muted">${thaiDate(e.date)}</span></div>
        <b style="color:var(--danger);">-${money(e.amount)} บาท</b>
      </div>
    </div>
  `).join('')}
  `;
}
function openExpenseDetail(id){
  if(id){
    const e = db.expenses.find(x=>x.id===id);
    state.expenseForm = JSON.parse(JSON.stringify(e));
  } else {
    state.expenseForm = {id:null, branchId:state.session.branchId, date:todayISO(), description:'', amount:0};
  }
  goTo('expenseDetail');
}
function renderExpenseDetail(){
  const e = state.expenseForm;
  const isEdit = !!e.id;
  return `
  <button class="btn btn-ghost" onclick="goTo('expenses')">${ICO.back} กลับ</button>
  <div class="card">
    <div class="field"><label>วันที่ซื้อ</label><input type="date" value="${e.date}" oninput="state.expenseForm.date=this.value"></div>
    <div class="field"><label>ซื้ออะไรบ้าง</label><textarea rows="3" data-fid="exp-desc" oninput="state.expenseForm.description=this.value" placeholder="เช่น แป้งสาลี 5 กก., เนย 2 กก., น้ำมัน 1 ปี๊บ">${esc(e.description)}</textarea></div>
    <div class="field"><label>ยอดจ่ายรวม (บาท)</label><input type="number" step="0.01" data-fid="exp-amount" value="${e.amount}" oninput="state.expenseForm.amount=parseFloat(this.value)||0"></div>
  </div>
  <button class="btn btn-primary btn-block" onclick="saveExpenseDetail()">${isEdit?'บันทึกการแก้ไข':'บันทึกรายจ่าย'}</button>
  ${isEdit?`<button class="btn btn-danger btn-block" style="margin-top:10px;" onclick="deleteExpenseDetail()">${ICO.trash} ลบรายการนี้</button>`:''}
  `;
}
function saveExpenseDetail(){
  const e = state.expenseForm;
  if(!e.date){ toast('กรุณาเลือกวันที่'); return; }
  if(!e.amount || e.amount<=0){ toast('กรุณาใส่ยอดจ่าย'); return; }
  if(e.id){
    const idx = db.expenses.findIndex(x=>x.id===e.id);
    db.expenses[idx] = e;
    persist(async ()=>{ const { error } = await sb.from('expenses').update({date:e.date, description:e.description, amount:e.amount}).eq('id',e.id); if(error) throw error; });
    toast('บันทึกการแก้ไขแล้ว');
  } else {
    e.id = uid('exp');
    e.createdAt = Date.now();
    db.expenses.push(e);
    persist(async ()=>{ const { error } = await sb.from('expenses').insert({id:e.id, branch_id:e.branchId, date:e.date, description:e.description, amount:e.amount, created_at:e.createdAt}); if(error) throw error; });
    toast('บันทึกรายจ่ายแล้ว');
  }
  goTo('expenses');
}
function deleteExpenseDetail(){
  const e = state.expenseForm;
  if(!confirm('ยืนยันลบรายการรายจ่ายนี้?')) return;
  db.expenses = db.expenses.filter(x=>x.id!==e.id);
  persist(async ()=>{ const { error } = await sb.from('expenses').delete().eq('id',e.id); if(error) throw error; });
  toast('ลบแล้ว');
  goTo('expenses');
}

/* ---------- RECURRING ---------- */
const DOW_NAMES=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
function renderRecurring(){
  return `
  <p class="muted" style="margin-bottom:14px;">ตั้งค่าลูกค้าที่สั่งซ้ำทุกสัปดาห์ (เช่น ร้านกาแฟ/ออฟฟิศ) ระบบจะช่วยสร้างออเดอร์ของสัปดาห์ให้ แล้วแก้จำนวนก่อนยืนยันได้</p>

  ${db.recurringOrders.map(r=>{
    const cust = db.customers.find(c=>c.id===r.customerId);
    return `<div class="card">
      <div class="row">
        <b>${esc(cust?cust.name:'-')}</b>
        <span class="badge badge-progress">ทุกวัน${DOW_NAMES[r.dayOfWeek]}</span>
      </div>
      <div class="divider"></div>
      ${r.items.map(i=>{ const p=db.products.find(x=>x.id===i.productId); return `<div class="row" style="padding:3px 0;"><span>${esc(p?p.name:'')}</span><span>${i.defaultQty} ชิ้น</span></div>`; }).join('')}
      <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="generateRecurring('${r.id}')">สร้างออเดอร์สัปดาห์นี้</button>
    </div>`;
  }).join('')}
  `;
}
function generateRecurring(rid){
  const r = db.recurringOrders.find(x=>x.id===rid);
  const cust = db.customers.find(c=>c.id===r.customerId);
  const activeProducts = sortedActiveProducts();
  state.orderForm = {
    id:null, branchId:cust.branchId, customerId:cust.id, employeeId:state.session.employeeId,
    deliveryDate: state.selectedDate, jobStatus:'pending', paymentStatus:'unpaid', paymentMethod:null,
    items: activeProducts.map(p=>{
      const ri = r.items.find(i=>i.productId===p.id);
      return {productId:p.id, qty: ri?ri.defaultQty:0, price:p.price};
    }),
  };
  state.customerSearch = cust.name;
  goTo('neworder');
  toast('สร้างร่างออเดอร์จากรายการประจำแล้ว แก้จำนวนได้ก่อนบันทึก');
}

/* ---------- REPORTS ---------- */
function renderReports(){
  const ranges = {'7':7,'30':30,'thismonth':null};
  let from,to;
  if(state.reportRange==='thismonth'){
    const d=new Date();
    const y=d.getFullYear(), m=d.getMonth();
    from = `${y}-${pad2(m+1)}-01`;
    const lastDay = new Date(y, m+1, 0).getDate();
    to = `${y}-${pad2(m+1)}-${pad2(lastDay)}`;
  } else if(state.reportRange==='custom'){
    from = state.reportCustomFrom;
    to = state.reportCustomTo;
  } else {
    from = addDays(todayISO(), -parseInt(state.reportRange));
    to = todayISO();
  }
  const orders = db.orders.filter(o=>{
    if(o.jobStatus==='cancelled') return false;
    if(state.branchScope==='mine' && o.branchId!==state.session.branchId) return false;
    return o.deliveryDate>=from && o.deliveryDate<=to;
  });
  const totalQty = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>x+i.qty,0),0);
  const totalRevenue = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>x+i.qty*i.price,0),0);
  const totalCost = orders.reduce((s,o)=>s+o.items.reduce((x,i)=>{ const p=db.products.find(pp=>pp.id===i.productId); return x + i.qty*(p?p.cost:0); },0),0);
  const profit = totalRevenue - totalCost;

  const byProduct={}; orders.forEach(o=>o.items.forEach(i=>{ byProduct[i.productId]=(byProduct[i.productId]||0)+i.qty; }));
  const topProducts = Object.entries(byProduct).sort((a,b)=>b[1]-a[1]);
  const maxProd = topProducts.length?topProducts[0][1]:1;

  const byEmp={}; orders.forEach(o=>{ if(!byEmp[o.employeeId]) byEmp[o.employeeId]={qty:0,orders:0}; byEmp[o.employeeId].qty += o.items.reduce((s,i)=>s+i.qty,0); byEmp[o.employeeId].orders++; });
  const empRows = Object.entries(byEmp).sort((a,b)=>b[1].qty-a[1].qty);
  const maxEmp = empRows.length? Math.max(...empRows.map(e=>e[1].qty)) : 1;

  return `
  <div class="pill-row">
    <div class="pill ${state.reportRange==='7'?'active':''}" onclick="state.reportRange='7';render();">7 วันล่าสุด</div>
    <div class="pill ${state.reportRange==='30'?'active':''}" onclick="state.reportRange='30';render();">30 วันล่าสุด</div>
    <div class="pill ${state.reportRange==='thismonth'?'active':''}" onclick="state.reportRange='thismonth';render();">เดือนนี้</div>
    <div class="pill ${state.reportRange==='custom'?'active':''}" onclick="state.reportRange='custom';render();">กำหนดเอง</div>
  </div>
  ${state.reportRange==='custom'?`
  <div class="card" style="margin-top:-4px;">
    <div style="display:flex;gap:8px;">
      <div class="field" style="flex:1;margin-bottom:0;"><label>ตั้งแต่</label><input type="date" value="${state.reportCustomFrom}" oninput="state.reportCustomFrom=this.value;render();"></div>
      <div class="field" style="flex:1;margin-bottom:0;"><label>ถึง</label><input type="date" value="${state.reportCustomTo}" oninput="state.reportCustomTo=this.value;render();"></div>
    </div>
    <p class="muted" style="margin-top:8px;">เลือกช่วงวันที่ได้อิสระ รวมวันในอนาคตด้วยได้</p>
  </div>
  `:''}

  <div style="display:flex;gap:10px;margin-bottom:14px;">
    <div class="card" style="flex:1;margin-bottom:0;"><p class="label-sm">จำนวนชิ้นรวม</p><p class="big-number" style="font-size:22px;">${totalQty.toLocaleString()}</p></div>
    <div class="card" style="flex:1;margin-bottom:0;"><p class="label-sm">ยอดขาย</p><p class="big-number" style="font-size:22px;">${money(totalRevenue)}</p></div>
  </div>
  <div class="card">
    <div class="row"><span>ยอดขายรวม</span><b>${money(totalRevenue)} บาท</b></div>
    <div class="row"><span>ต้นทุนวัตถุดิบโดยประมาณ</span><b>${money(totalCost)} บาท</b></div>
    <div class="divider"></div>
    <div class="row"><span style="font-weight:700;">กำไรขั้นต้น</span><b style="color:var(--success);">${money(profit)} บาท</b></div>
  </div>

  <h3>ไส้ขายดี</h3>
  <div class="card">
    ${topProducts.length===0?'<p class="muted">ไม่มีข้อมูล</p>':topProducts.map(([pid,qty])=>{
      const p=db.products.find(x=>x.id===pid);
      return `<div class="bar-row"><div class="row"><span style="font-size:13.5px;">${esc(p?p.name:'')}</span><span style="font-size:13.5px;font-weight:700;">${qty}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,qty/maxProd*100)}%;"></div></div></div>`;
    }).join('')}
  </div>

  <h3>ยอดขายแยกตามพนักงาน</h3>
  <div class="card">
    ${empRows.length===0?'<p class="muted">ไม่มีข้อมูล</p>':empRows.map(([eid,d])=>{
      const e=db.employees.find(x=>x.id===eid);
      return `<div class="bar-row"><div class="row"><span style="font-size:13.5px;">${esc(e?e.name:'')} (${d.orders} ออเดอร์)</span><span style="font-size:13.5px;font-weight:700;">${d.qty} ชิ้น</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,d.qty/maxEmp*100)}%;"></div></div></div>`;
    }).join('')}
  </div>
  `;
}

/* ---------- MORE / SETTINGS ---------- */
function renderMore(){
  const links=[
    {v:'customers',ico:ICO.users,label:'จัดการลูกค้า',sub:'รายชื่อ เบอร์โทร ที่อยู่จัดส่ง'},
    {v:'employees',ico:ICO.users,label:'จัดการพนักงาน',sub:'ชื่อพนักงาน และรหัส PIN'},
    {v:'products',ico:ICO.box,label:'จัดการไส้กะหรี่ปั๊ป',sub:'ราคา ต้นทุน สูตร เปิด/ปิดขาย'},
    {v:'ingredients',ico:ICO.box,label:'จัดการวัตถุดิบ',sub:'ชื่อ หน่วยนับ ต้นทุนต่อหน่วย'},
    {v:'expenses',ico:ICO.chart,label:'ต้นทุน / รายจ่าย',sub:'บันทึกรายจ่ายซื้อของ ดูกำไรจริง'},
    {v:'recurring',ico:ICO.repeat,label:'ออเดอร์ประจำ',sub:'ลูกค้าที่สั่งซ้ำทุกสัปดาห์'},
    {v:'settings',ico:ICO.gear,label:'ตั้งค่าร้าน',sub:'PromptPay สาขา และอื่นๆ'},
  ];
  return `<div class="card" style="padding:6px 16px;">
    ${links.map(l=>`<div class="more-link" onclick="goTo('${l.v}')"><span class="more-icon">${l.ico}</span><div class="col"><b>${l.label}</b><span class="muted">${l.sub}</span></div></div>`).join('')}
  </div>`;
}
function renderSettings(){
  return `
  <div class="card">
    <div class="field"><label>หมายเลข PromptPay ของร้าน</label>
      <input data-fid="settings-promptpay" value="${esc(db.settings.promptpayId)}" oninput="updatePromptpay(this.value)">
    </div>
    <p class="muted">ใช้สร้าง QR รับเงินจากลูกค้า</p>
  </div>
  <div class="card">
    <div class="row">
      <div class="col"><b>เปิดใช้งานหลายสาขา</b><span class="muted">ตอนนี้: ${db.settings.multiBranch?'เปิดอยู่':'ปิดอยู่ (โหมดสาขาเดียว)'}</span></div>
      <button class="btn ${db.settings.multiBranch?'btn-success':''}" onclick="toggleMultiBranch()">${db.settings.multiBranch?'ปิด':'เปิด'}</button>
    </div>
  </div>
  <div class="card">
    <p class="label-sm">สาขา</p>
    ${db.branches.map(b=>`<div class="list-row"><span>${esc(b.name)}</span><button class="btn btn-sm" onclick="renameBranchPrompt('${b.id}')">แก้ไขชื่อ</button></div>`).join('')}
    ${db.settings.multiBranch?`<button class="btn btn-block" style="margin-top:10px;" onclick="addBranchPrompt()">+ เพิ่มสาขา</button>`:''}
  </div>
  <button class="btn btn-danger btn-block" onclick="clearMockData()">ล้างข้อมูลม้อคอัพทั้งหมด</button>
  <p class="muted" style="text-align:center;margin-top:20px;">เชื่อมต่อฐานข้อมูล Supabase แล้ว ✅<br>ข้อมูลไม่หายเมื่อรีเฟรช และใช้ร่วมกันได้ทุกเครื่อง</p>
  `;
}
function updatePromptpay(val){
  db.settings.promptpayId = val;
  persist(async ()=>{ const { error } = await sb.from('settings').upsert({id:1, promptpay_id:val, multi_branch:db.settings.multiBranch}); if(error) throw error; });
}
function toggleMultiBranch(){
  db.settings.multiBranch = !db.settings.multiBranch;
  persist(async ()=>{ const { error } = await sb.from('settings').upsert({id:1, promptpay_id:db.settings.promptpayId, multi_branch:db.settings.multiBranch}); if(error) throw error; });
  render();
  toast(db.settings.multiBranch?'เปิดใช้งานหลายสาขาแล้ว':'ปิดโหมดหลายสาขาแล้ว');
}
function renameBranchPrompt(id){
  const b = db.branches.find(x=>x.id===id);
  const name = prompt('ชื่อสาขา:', b.name); if(!name) return;
  b.name = name.trim();
  persist(async ()=>{ const { error } = await sb.from('branches').update({name:b.name}).eq('id',id); if(error) throw error; });
  render(); toast('แก้ไขชื่อสาขาแล้ว');
}
function addBranchPrompt(){
  const name = prompt('ชื่อสาขาใหม่:'); if(!name) return;
  const b = {id:uid('b'), name:name.trim()};
  db.branches.push(b);
  persist(async ()=>{ const { error } = await sb.from('branches').insert(b); if(error) throw error; });
  render(); toast('เพิ่มสาขาแล้ว');
}
async function clearMockData(){
  if(!confirm('ล้างข้อมูลทั้งหมด (ลูกค้า/ออเดอร์/พนักงาน/ไส้ ฯลฯ) แล้วเริ่มต้นใหม่?')) return;
  if(sb){
    try{
      await sb.from('order_items').delete().neq('id',-1);
      await sb.from('recurring_order_items').delete().neq('id',-1);
      await sb.from('recipe_items').delete().neq('id',-1);
      await sb.from('orders').delete().neq('id','');
      await sb.from('recurring_orders').delete().neq('id','');
      await sb.from('customers').delete().neq('id','');
      await sb.from('products').delete().neq('id','');
      await sb.from('ingredients').delete().neq('id','');
      await sb.from('expenses').delete().neq('id','');
      await sb.from('employees').delete().neq('id','');
      await sb.from('branches').delete().neq('id','');
      await sb.from('settings').delete().eq('id',1);
      await bootstrapSeedToSupabase();
      await loadAllFromSupabase();
    }catch(err){ toast('ล้างข้อมูลไม่สำเร็จ: '+(err.message||err)); return; }
  } else {
    db = seed();
  }
  state.session=null; state.loginBranch=null; state.loginEmployee=null; state.pinInput=''; state.view='login';
  toast('ล้างข้อมูลเรียบร้อยแล้ว');
  render();
}

/* ---------- after render: attach QR + focus fixes ---------- */
function afterRender(){
  document.querySelectorAll('input,textarea').forEach(el=>{
    el.addEventListener('keydown', e=>e.stopPropagation());
  });
  if(state.qrOrderId){
    const holder = document.getElementById('qrcode-holder');
    if(holder){
      holder.innerHTML='';
      const payload = promptPayPayload(db.settings.promptpayId, state._qrTotal||0);
      try{ new QRCode(holder, {text:payload, width:200, height:200, correctLevel:QRCode.CorrectLevel.M}); }
      catch(e){ holder.innerHTML = `<p class="muted" style="word-break:break-all;font-size:11px;">${esc(payload)}</p>`; }
    }
  }
}

boot();
</script>
